[DRAIN]
# Drain tree hyperparameters for Blue Gene/L (BGL) RAS event logs.
#
# sim_th       : similarity threshold for tree traversal; 0.4 matched HDFS
#                well and BGL's message syntax is comparably structured.
# depth        : max tree depth; 4 is sufficient because the first two
#                informative tokens of every BGL message are usually
#                <subcomponent> and <level>.
# max_children : per-node branching factor; 100 is safe for BGL's moderate
#                lexical variety.
# max_clusters : cap on learned templates. BGL has more distinct templates
#                than HDFS (empirically ~300–400 on the full LogHub dump)
#                so we allow headroom above the HDFS=512 default.
sim_th = 0.4
depth = 4
max_children = 100
max_clusters = 1024
extra_delimiters = []

[SNAPSHOT]
snapshot_interval_minutes = 0
compress_state = False

[MASKING]
# Replace high-cardinality variable tokens with symbolic placeholders
# *before* Drain tokenises the line. Each regex match is substituted with
# ``<mask_with>``. Rules are applied in order; first match wins per span.
#
# Chosen masks (and why):
#   NODE  — rack/midplane/node/card/job/unit identifiers. Without masking
#           Drain would branch on ~1000+ physical nodes, exploding the
#           template count.
#   IP    — IPv4 addresses with optional port, seen in CIOD / MMCS logs.
#   HEX   — 0x-prefixed addresses (e.g. instruction addr, dear, iar).
#   ADDR  — bare 8-hex-digit addresses (e.g. ``iar 0014a150 dear 009a8578``).
#           Anchored to ``\b`` to avoid false positives inside words.
#   CORE  — coredump filenames like ``core.1482``.
#   PATH  — absolute Unix paths (``/home/…``), seen in CIOD load errors.
#   REASON— kernel "reason <N>" / "condition <N>" suffix integers that are
#           pure enumerations.
#
# Intentionally NOT masked:
#   Bare integers — they carry event-rate signal (``257254794 double-hummer
#   alignment exceptions``) and Drain's own <*> handling is adequate.
#   NULL          — kept as a literal because it's a meaningful sentinel
#                   distinct from a real node id.
masking = [
    {"regex_pattern": "\\bR\\d+-M\\d+-N[A-Z0-9]+(?:-[CI])?(?::J\\d+-U\\d+)?\\b", "mask_with": "NODE"},
    {"regex_pattern": "\\b(?:\\d{1,3}\\.){3}\\d{1,3}(?::\\d+)?\\b",              "mask_with": "IP"},
    {"regex_pattern": "0x[0-9a-fA-F]+",                                          "mask_with": "HEX"},
    {"regex_pattern": "\\b[0-9a-f]{8}\\b",                                       "mask_with": "ADDR"},
    {"regex_pattern": "\\bcore\\.\\d+\\b",                                       "mask_with": "CORE"},
    {"regex_pattern": "(?<=\\s)/[\\w./\\-]+",                                    "mask_with": "PATH"},
    {"regex_pattern": "\\b(?:reason|condition)\\s+\\d+\\b",                      "mask_with": "REASON"}
    ]
