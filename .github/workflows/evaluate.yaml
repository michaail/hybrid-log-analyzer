name: Evaluate on PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write    # CML needs this to post PR comments
  issues: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0    # full history for dvc metrics diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: iterative/setup-cml@v3

      - name: Authenticate to GCS
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m ipykernel install --user --name python3

      - name: Pull data & models from DVC remote
        run: dvc pull

      - name: Reproduce evaluation stage
        run: dvc repro evaluate

      - name: Generate CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 📊 Model Evaluation Report" > report.md
          echo "" >> report.md

          # Metrics comparison table
          echo "### Metrics Diff (vs. main)" >> report.md
          dvc metrics diff main --show-md >> report.md 2>/dev/null || echo "_No previous metrics on main to compare._" >> report.md
          echo "" >> report.md

          # Embed plots
          echo "### Plots" >> report.md
          if [ -f plots/roc.png ]; then
            echo "#### ROC Curve" >> report.md
            cml asset publish plots/roc.png --md >> report.md
          fi
          if [ -f plots/loss.png ]; then
            echo "#### Training Loss" >> report.md
            cml asset publish plots/loss.png --md >> report.md
          fi
          echo "" >> report.md

          # Current metrics
          echo "### Current Metrics" >> report.md
          echo '```json' >> report.md
          cat metrics.json >> report.md
          echo '' >> report.md
          echo '```' >> report.md

          # Post comment
          cml comment create report.md

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-${{ github.sha }}
          path: |
            metrics.json
            plots/
            outputs/evaluate_output.ipynb
          retention-days: 30
